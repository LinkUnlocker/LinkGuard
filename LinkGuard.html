<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkGuard Pro - Secure SaaS Link Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-mesh { background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0, transparent 50%); }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar { transition: width 1s linear; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .step-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen bg-mesh">

    <!-- [TOAST SYSTEM] -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-2"></div>

    <!-- [ADMIN APP WRAPPER] -->
    <div id="admin-app" class="hidden">
        <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 glass border-r z-50 transition-transform -translate-x-full md:translate-x-0">
            <div class="p-6 flex flex-col h-full">
                <div class="flex items-center gap-2 mb-10">
                    <div class="p-2 bg-indigo-600 rounded-lg text-white"><i data-lucide="shield-check"></i></div>
                    <h1 class="text-xl font-bold tracking-tight">LinkGuard <span class="text-indigo-600">Pro</span></h1>
                </div>
                
                <nav class="space-y-1 flex-1">
                    <button onclick="showSection('dashboard')" class="nav-link flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-indigo-50 hover:text-indigo-600 dark:hover:bg-indigo-900/20 active-nav bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                    </button>
                    <button onclick="showSection('links')" class="nav-link flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-indigo-50 hover:text-indigo-600 dark:hover:bg-indigo-900/20">
                        <i data-lucide="link" class="w-5 h-5"></i> Manage Links
                    </button>
                    <button id="nav-users" onclick="showSection('users')" class="nav-link flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-indigo-50 hover:text-indigo-600 dark:hover:bg-indigo-900/20">
                        <i data-lucide="users" class="w-5 h-5"></i> User Management
                    </button>
                    <button onclick="showSection('settings')" class="nav-link flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-indigo-50 hover:text-indigo-600 dark:hover:bg-indigo-900/20">
                        <i data-lucide="settings" class="w-5 h-5"></i> Settings
                    </button>
                </nav>

                <div class="pt-6 border-t dark:border-slate-800">
                    <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <i data-lucide="moon" id="theme-icon"></i> <span>Dark Mode</span>
                    </button>
                    <button onclick="logout()" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all">
                        <i data-lucide="log-out"></i> Logout
                    </button>
                </div>
            </div>
        </aside>

        <main class="md:ml-64 p-4 md:p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="section-title" class="text-3xl font-bold">Dashboard</h2>
                    <p class="text-slate-500 text-sm">Welcome, <span id="current-user-display" class="font-bold">Admin</span></p>
                </div>
                <button onclick="openLinkModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-medium shadow-lg flex items-center gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i> Create New Link
                </button>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard-section" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-6 rounded-2xl shadow-sm"><div class="flex items-center gap-4"><div class="p-3 bg-blue-100 text-blue-600 rounded-xl"><i data-lucide="mouse-pointer-2"></i></div><div><p class="text-slate-500 text-sm">Total Clicks</p><h3 id="stat-clicks" class="text-2xl font-bold">0</h3></div></div></div>
                    <div class="glass p-6 rounded-2xl shadow-sm"><div class="flex items-center gap-4"><div class="p-3 bg-green-100 text-green-600 rounded-xl"><i data-lucide="check-circle"></i></div><div><p class="text-slate-500 text-sm">Unlocks</p><h3 id="stat-unlocks" class="text-2xl font-bold">0</h3></div></div></div>
                    <div class="glass p-6 rounded-2xl shadow-sm"><div class="flex items-center gap-4"><div class="p-3 bg-purple-100 text-purple-600 rounded-xl"><i data-lucide="link"></i></div><div><p class="text-slate-500 text-sm">Active Links</p><h3 id="stat-links" class="text-2xl font-bold">0</h3></div></div></div>
                </div>
                <div class="glass p-8 rounded-2xl shadow-sm h-[350px]">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </section>

            <!-- Links Section -->
            <section id="links-section" class="hidden">
                <div id="links-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <!-- User Management Section -->
            <section id="users-section" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold">System Users</h3>
                    <button onclick="openUserModal()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">Add New User</button>
                </div>
                <div class="glass rounded-2xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 dark:bg-slate-900">
                            <tr>
                                <th class="p-4">Username</th>
                                <th class="p-4">Role</th>
                                <th class="p-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings-section" class="hidden max-w-md">
                <div class="glass p-6 rounded-2xl space-y-4">
                    <h3 class="text-xl font-bold">Account Settings</h3>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">New Password</label>
                        <input type="password" id="new-password" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900" placeholder="••••••••">
                    </div>
                    <button onclick="updatePassword()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">Update Password</button>
                </div>
            </section>
        </main>
    </div>

    <!-- [LANDING PAGE APP WRAPPER] -->
    <div id="unlock-app" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl text-center space-y-6">
            <div id="landing-image-container" class="hidden">
                <img id="landing-img" src="" class="w-full h-48 object-cover rounded-3xl shadow-lg mb-4">
            </div>
            <div id="unlock-header">
                <h1 id="landing-title" class="text-2xl font-extrabold tracking-tight">Content Locked</h1>
                <p class="text-slate-500 mt-2">Complete the steps sequentially to unlock.</p>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2.5">
                <div id="unlock-progress" class="bg-indigo-600 h-2.5 rounded-full w-0 transition-all duration-500"></div>
            </div>
            <div id="unlock-steps" class="space-y-4"></div>
            <button id="main-open-btn" disabled class="w-full py-4 bg-slate-200 dark:bg-slate-800 text-slate-400 font-bold rounded-2xl cursor-not-allowed transition-all flex items-center justify-center gap-3">
                <i data-lucide="external-link"></i> Get Link
            </button>
        </div>
    </div>

    <!-- [LOGIN MODAL] -->
    <div id="auth-app" class="hidden fixed inset-0 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm z-[100]">
        <div class="glass p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6">LinkGuard Pro Login</h2>
            <input type="text" id="login-user" placeholder="Username" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-800 mb-3">
            <input type="password" id="login-pass" placeholder="Password" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-800 mb-4">
            <button onclick="tryLogin()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold">Login</button>
            <p class="mt-4 text-xs text-slate-500">Default: 12345678 / 12345678</p>
        </div>
    </div>

    <!-- [LINK MODAL] -->
    <div id="link-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="glass w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl modal-enter p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-2xl font-bold">Create New Link</h3>
                <button onclick="closeModal('link-modal')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <form id="link-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">Link Title</label>
                        <input type="text" id="title" required class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">Destination URL</label>
                        <input type="url" id="openLink" required class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold">Banner Image (Optional)</label>
                    <input type="file" id="image-upload" accept="image/*" class="w-full text-xs">
                    <input type="hidden" id="image-base64">
                </div>
                <div id="platform-rows" class="space-y-3"></div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('link-modal')" class="flex-1 py-3 border font-semibold rounded-xl">Cancel</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white font-semibold rounded-xl">Save Link</button>
                </div>
            </form>
        </div>
    </div>

    <!-- [USER MODAL] -->
    <div id="user-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-3xl shadow-2xl p-8">
            <h3 class="text-xl font-bold mb-6">User Details</h3>
            <div class="space-y-4">
                <input type="hidden" id="edit-user-id">
                <input type="text" id="user-username" placeholder="Username" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900">
                <input type="password" id="user-password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900">
                <select id="user-role" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="closeModal('user-modal')" class="flex-1 py-3 border rounded-xl">Cancel</button>
                    <button onclick="saveUser()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PLATFORMS = [
            { id: 'youtube', name: 'YouTube', icon: 'youtube', color: 'bg-red-500' },
            { id: 'facebook', name: 'Facebook', icon: 'facebook', color: 'bg-blue-600' },
            { id: 'tiktok', name: 'TikTok', icon: 'music', color: 'bg-black' },
            { id: 'telegram', name: 'Telegram', icon: 'send', color: 'bg-sky-500' },
            { id: 'instagram', name: 'Instagram', icon: 'instagram', color: 'bg-pink-600' },
            { id: 'twitter', name: 'Twitter (X)', icon: 'twitter', color: 'bg-sky-400' },
            { id: 'linkedin', name: 'LinkedIn', icon: 'linkedin', color: 'bg-blue-700' },
            { id: 'discord', name: 'Discord', icon: 'message-square', color: 'bg-indigo-500' },
            { id: 'custom', name: 'Website', icon: 'globe', color: 'bg-emerald-500' }
        ];

        // --- STATE & LOCAL STORAGE ---
        let users = JSON.parse(localStorage.getItem('lg_users')) || [
            { id: '1', username: 'admin', password: 'admin123', role: 'admin' }
        ];
        let links = JSON.parse(localStorage.getItem('lg_links')) || [];
        let stats = JSON.parse(localStorage.getItem('lg_stats')) || { clicks: 0, unlocks: 0 };
        let currentUser = JSON.parse(sessionStorage.getItem('lg_active_user'));

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('id');
            if (linkId) {
                initLandingPage(linkId);
            } else {
                checkAuth();
            }
            renderPlatformInputs();
            lucide.createIcons();
        });

        function checkAuth() {
            if (currentUser) {
                document.getElementById('admin-app').classList.remove('hidden');
                document.getElementById('current-user-display').innerText = currentUser.username;
                if (currentUser.role !== 'admin') {
                    document.getElementById('nav-users').classList.add('hidden');
                }
                refreshDashboard();
            } else {
                document.getElementById('auth-app').classList.remove('hidden');
            }
        }

        function tryLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const user = users.find(x => x.username === u && x.password === p);
            if (user) {
                sessionStorage.setItem('lg_active_user', JSON.stringify(user));
                location.reload();
            } else {
                showToast('Invalid login!', 'error');
            }
        }

        function logout() {
            sessionStorage.removeItem('lg_active_user');
            location.reload();
        }

        // --- LANDING PAGE (SEQUENTIAL) ---
        let stepStatus = [];
        let activeLink = null;

        function initLandingPage(id) {
            activeLink = links.find(l => l.id === id);
            if (!activeLink) {
                document.body.innerHTML = "Link not found";
                return;
            }

            stats.clicks++;
            localStorage.setItem('lg_stats', JSON.stringify(stats));

            document.getElementById('unlock-app').classList.remove('hidden');
            document.getElementById('landing-title').innerText = activeLink.title;
            
            if(activeLink.image) {
                const imgContainer = document.getElementById('landing-image-container');
                const imgEl = document.getElementById('landing-img');
                imgEl.src = activeLink.image;
                imgContainer.classList.remove('hidden');
            }

            const stepsContainer = document.getElementById('unlock-steps');
            stepsContainer.innerHTML = '';
            
            activeLink.enabledUnlocks.forEach((pId, index) => {
                const p = PLATFORMS.find(x => x.id === pId);
                const isFirst = index === 0;
                stepStatus[index] = false;

                const stepEl = document.createElement('div');
                stepEl.innerHTML = `
                    <button onclick="runStep(${index})" id="step-btn-${index}" 
                        class="w-full p-4 glass border rounded-2xl flex items-center justify-between transition-all ${isFirst ? '' : 'step-disabled'}">
                        <div class="flex items-center gap-4">
                            <div class="p-2 ${p.color} text-white rounded-lg shadow-lg"><i data-lucide="${p.icon}"></i></div>
                            <span class="font-bold">${p.name}</span>
                        </div>
                        <div id="step-status-${index}" class="text-indigo-600"><i data-lucide="chevron-right"></i></div>
                        <div id="step-timer-bar-${index}" class="absolute bottom-0 left-0 h-1 bg-indigo-500 rounded-b-2xl w-0 progress-bar"></div>
                    </button>
                `;
                stepsContainer.appendChild(stepEl);
            });
            lucide.createIcons();
        }

        function runStep(index) {
            if (stepStatus[index]) return;
            
            const pId = activeLink.enabledUnlocks[index];
            const duration = activeLink.platformTimers[pId];
            const url = activeLink.unlockLinks[pId];
            
            window.open(url, '_blank');
            
            const btn = document.getElementById(`step-btn-${index}`);
            const statusIcon = document.getElementById(`step-status-${index}`);
            const bar = document.getElementById(`step-timer-bar-${index}`);

            let timeLeft = duration;
            const interval = setInterval(() => {
                timeLeft--;
                statusIcon.innerHTML = `<span class="text-xs font-mono">${timeLeft}s</span>`;
                bar.style.width = `${((duration - timeLeft) / duration) * 100}%`;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    stepStatus[index] = true;
                    statusIcon.innerHTML = `<i data-lucide="check-circle-2" class="text-green-500"></i>`;
                    btn.classList.add('border-green-300');
                    lucide.createIcons();
                    
                    updateProgress();
                    
                    // Enable next step
                    if (index + 1 < activeLink.enabledUnlocks.length) {
                        const nextBtn = document.getElementById(`step-btn-${index + 1}`);
                        nextBtn.classList.remove('step-disabled');
                        showToast('Next step unlocked!', 'success');
                    } else {
                        enableFinalButton();
                    }
                }
            }, 1000);
        }

        function updateProgress() {
            const completed = stepStatus.filter(x => x).length;
            const total = activeLink.enabledUnlocks.length;
            document.getElementById('unlock-progress').style.width = `${(completed/total)*100}%`;
        }

        function enableFinalButton() {
            const btn = document.getElementById('main-open-btn');
            btn.disabled = false;
            btn.className = "w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl hover:bg-indigo-700 flex items-center justify-center gap-3 animate-pulse";
            btn.onclick = () => {
                stats.unlocks++;
                localStorage.setItem('lg_stats', JSON.stringify(stats));
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => window.location.href = activeLink.openLink, 1000);
            };
        }

        // --- DASHBOARD ACTIONS ---
        function refreshDashboard() {
            document.getElementById('stat-clicks').innerText = stats.clicks;
            document.getElementById('stat-unlocks').innerText = stats.unlocks;
            document.getElementById('stat-links').innerText = links.length;
            renderLinks();
            renderUsers();
            renderChart();
        }

        function renderLinks() {
            const grid = document.getElementById('links-grid');
            grid.innerHTML = '';
            links.forEach(l => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-2xl shadow-sm card-hover relative group";
                card.innerHTML = `
                    <div class="mb-4">
                        ${l.image ? `<img src="${l.image}" class="w-full h-24 object-cover rounded-xl mb-3">` : ''}
                        <h4 class="font-bold text-lg">${l.title}</h4>
                        <p class="text-xs text-slate-400">Created: ${new Date(l.createdAt).toLocaleDateString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyLink('${l.id}')" class="flex-1 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-xs font-bold">Copy URL</button>
                        <button onclick="editLink('${l.id}')" class="p-2 hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteLink('${l.id}')" class="p-2 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function renderUsers() {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';
            users.forEach(u => {
                tbody.innerHTML += `
                    <tr class="border-t dark:border-slate-800">
                        <td class="p-4">${u.username}</td>
                        <td class="p-4 uppercase text-xs font-bold">${u.role}</td>
                        <td class="p-4 flex gap-2">
                            <button onclick="editUser('${u.id}')" class="text-blue-500">Edit</button>
                            <button onclick="deleteUser('${u.id}')" class="text-red-500">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- LINK LOGIC ---
        function renderPlatformInputs() {
            const container = document.getElementById('platform-rows');
            container.innerHTML = PLATFORMS.map(p => `
                <div class="flex items-center gap-3 p-3 glass border rounded-xl">
                    <input type="checkbox" id="check-${p.id}" class="w-4 h-4">
                    <div class="flex-1">
                        <p class="text-xs font-bold">${p.name}</p>
                        <input type="url" id="url-${p.id}" placeholder="Link" class="w-full text-xs bg-transparent border-b">
                    </div>
                    <input type="number" id="timer-${p.id}" value="10" class="w-12 text-xs bg-transparent border-b">
                </div>
            `).join('');
        }

        document.getElementById('image-upload').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => document.getElementById('image-base64').value = reader.result;
            if(file) reader.readAsDataURL(file);
        };

        document.getElementById('link-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value || Math.random().toString(36).substr(2, 9);
            const enabledUnlocks = [];
            const unlockLinks = {};
            const platformTimers = {};

            PLATFORMS.forEach(p => {
                if (document.getElementById(`check-${p.id}`).checked) {
                    enabledUnlocks.push(p.id);
                    unlockLinks[p.id] = document.getElementById(`url-${p.id}`).value;
                    platformTimers[p.id] = parseInt(document.getElementById(`timer-${p.id}`).value);
                }
            });

            const linkData = {
                id,
                title: document.getElementById('title').value,
                openLink: document.getElementById('openLink').value,
                image: document.getElementById('image-base64').value,
                enabledUnlocks,
                unlockLinks,
                platformTimers,
                createdAt: new Date().toISOString()
            };

            const idx = links.findIndex(l => l.id === id);
            if(idx > -1) links[idx] = linkData;
            else links.push(linkData);

            localStorage.setItem('lg_links', JSON.stringify(links));
            closeModal('link-modal');
            refreshDashboard();
            showToast('Link saved!');
        };

        function deleteLink(id) {
            if(confirm('Delete?')) {
                links = links.filter(l => l.id !== id);
                localStorage.setItem('lg_links', JSON.stringify(links));
                refreshDashboard();
            }
        }

        function editLink(id) {
            const l = links.find(x => x.id === id);
            openLinkModal();
            document.getElementById('edit-id').value = l.id;
            document.getElementById('title').value = l.title;
            document.getElementById('openLink').value = l.openLink;
            document.getElementById('image-base64').value = l.image || '';
            PLATFORMS.forEach(p => {
                const active = l.enabledUnlocks.includes(p.id);
                document.getElementById(`check-${p.id}`).checked = active;
                document.getElementById(`url-${p.id}`).value = l.unlockLinks[p.id] || '';
                document.getElementById(`timer-${p.id}`).value = l.platformTimers[p.id] || 10;
            });
        }

        // --- USER LOGIC ---
        function saveUser() {
            const id = document.getElementById('edit-user-id').value || Date.now().toString();
            const u = document.getElementById('user-username').value;
            const p = document.getElementById('user-password').value;
            const r = document.getElementById('user-role').value;

            if(!u || !p) return showToast('Fill all fields', 'error');

            const userData = { id, username: u, password: p, role: r };
            const idx = users.findIndex(x => x.id === id);
            if(idx > -1) users[idx] = userData;
            else users.push(userData);

            localStorage.setItem('lg_users', JSON.stringify(users));
            closeModal('user-modal');
            renderUsers();
            showToast('User saved');
        }

        function deleteUser(id) {
            if(id === '1') return showToast('Cannot delete root admin', 'error');
            users = users.filter(u => u.id !== id);
            localStorage.setItem('lg_users', JSON.stringify(users));
            renderUsers();
        }

        function editUser(id) {
            const u = users.find(x => x.id === id);
            openUserModal();
            document.getElementById('edit-user-id').value = u.id;
            document.getElementById('user-username').value = u.username;
            document.getElementById('user-password').value = u.password;
            document.getElementById('user-role').value = u.role;
        }

        function updatePassword() {
            const pass = document.getElementById('new-password').value;
            if(!pass) return showToast('Enter password', 'error');
            const idx = users.findIndex(u => u.username === currentUser.username);
            users[idx].password = pass;
            localStorage.setItem('lg_users', JSON.stringify(users));
            showToast('Password updated! Please login again.');
            setTimeout(logout, 2000);
        }

        // --- UI HELPERS ---
        function openLinkModal() {
            document.getElementById('link-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('image-base64').value = '';
            document.getElementById('link-modal').classList.remove('hidden');
        }

        function openUserModal() {
            document.getElementById('edit-user-id').value = '';
            document.getElementById('user-modal').classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function showSection(name) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${name}-section`).classList.remove('hidden');
            document.getElementById('section-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-indigo-50', 'text-indigo-600', 'dark:bg-indigo-900/20'));
            event.currentTarget.classList.add('bg-indigo-50', 'text-indigo-600', 'dark:bg-indigo-900/20');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function copyLink(id) {
            const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
            navigator.clipboard.writeText(url);
            showToast('Link copied!');
        }

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl text-white font-bold shadow-2xl ${type === 'success' ? 'bg-indigo-600' : 'bg-red-500'}`;
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function renderChart() {
            const ctx = document.getElementById('analyticsChart');
            if(!ctx) return;
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{ label: 'Clicks', data: [stats.clicks, stats.clicks+2, stats.clicks+5, 2, 8, 10], borderColor: '#6366f1', tension: 0.4 }]
                },
                options: { maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
